<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Len-Den Ledger</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #e5ddd5; height: 100vh; display: flex; flex-direction: column; }

        /* Header & Sidebar */
        header { background: #075e54; color: white; padding: 10px 15px; display: flex; align-items: center; height: 60px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        #sidebar { position: fixed; left: -100%; top: 0; width: 85%; height: 100%; background: white; z-index: 2000; transition: 0.4s; box-shadow: 5px 0 15px rgba(0,0,0,0.3); }
        #sidebar.open { left: 0; }
        .sidebar-header { background: #075e54; color: white; padding: 20px; font-size: 20px; display: flex; justify-content: space-between; }
        
        /* Stats Styling */
        .stats-bar { position: fixed; top: 60px; width: 100%; background: #fff; display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; padding: 10px 5px; border-bottom: 1px solid #ddd; z-index: 900; font-size: 12px; }
        .stat-item b { display: block; font-size: 15px; }
        .text-bill { color: #e74c3c; }
        .text-jama { color: #27ae60; }
        .text-net { color: #2980b9; }

        /* Chat Area */
        #chat-container { flex: 1; margin-top: 125px; margin-bottom: 70px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .message { max-width: 85%; padding: 10px; border-radius: 8px; margin-bottom: 10px; position: relative; font-size: 16px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-plus { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 0; }
        .msg-minus { align-self: flex-start; background: #ffffff; border-top-left-radius: 0; }
        .msg-deleted { background: #f0f0f0 !important; color: #999 !important; text-decoration: line-through; opacity: 0.6; }
        
        /* Input Footer */
        footer { position: fixed; bottom: 0; width: 100%; background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 8px; z-index: 1000; }
        #chatInput { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; outline: none; font-size: 16px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.1); }
        .send-btn { background: #128c7e; color: white; border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; }

        /* Form */
        .cust-form { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .cust-form input { padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">Khata Book <span onclick="toggleSidebar()">&times;</span></div>
    <div class="cust-form">
        <input type="text" id="cName" placeholder="Customer Name">
        <input type="number" id="cMobile" placeholder="Mobile Number">
        <button onclick="addNewCustomer()" style="padding:12px; background:#128c7e; color:white; border:none; border-radius:8px;">Save Customer</button>
    </div>
    <div id="customerList" style="overflow-y:auto; height:calc(100% - 250px);"></div>
</div>

<header>
    <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:24px; margin-right:15px;">❯</button>
    <div style="flex:1">
        <div id="headName" style="font-weight: bold;">Len-Den Box</div>
        <div id="headInfo" style="font-size: 11px;">Select a customer</div>
    </div>
    <button onclick="downloadPDF()" style="background:#e74c3c; color:white; border:none; padding:8px 12px; border-radius:5px; font-size:12px;">PDF</button>
</header>

<div class="stats-bar">
    <div class="stat-item text-bill">Total Bill (-)<b id="sumBill">0</b></div>
    <div class="stat-item text-jama">Total Jama (+)<b id="sumJama">0</b></div>
    <div class="stat-item text-net">Final Balance<b id="sumNet">0</b></div>
</div>

<div id="chat-container"></div>

<footer>
    <input type="text" id="chatInput" 
           placeholder="Ex: Item 5*10 or +500" 
           enterkeyhint="send" 
           onkeypress="if(event.key==='Enter') processChat()">
    <button class="send-btn" onclick="processChat()">➤</button>
</footer>

<script>
    let customers = JSON.parse(localStorage.getItem('ld_v4_cust')) || [];
    let chats = JSON.parse(localStorage.getItem('ld_v4_chats')) || {};
    let activeID = null;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function addNewCustomer() {
        const name = document.getElementById('cName').value;
        const mobile = document.getElementById('cMobile').value;
        if(!name || !mobile) return alert("Puri jankari bharein");
        const id = 'C' + Date.now();
        customers.push({ id, name, mobile });
        localStorage.setItem('ld_v4_cust', JSON.stringify(customers));
        renderCustList();
    }

    function renderCustList() {
        document.getElementById('customerList').innerHTML = customers.map(c => `
            <div onclick="selectCust('${c.id}')" style="padding:15px; border-bottom:1px solid #eee;">
                <b>${c.name}</b><br><small>${c.mobile}</small>
            </div>
        `).join('');
    }

    function selectCust(id) {
        activeID = id;
        const c = customers.find(x => x.id === id);
        document.getElementById('headName').innerText = c.name;
        document.getElementById('headInfo').innerText = c.mobile;
        toggleSidebar();
        renderMessages();
    }

    function processChat() {
        if(!activeID) return alert("Pehle customer chunein");
        const input = document.getElementById('chatInput');
        let raw = input.value.trim();
        if(!raw) return;

        // Smart Math Logic
        let displayMsg = raw;
        if (raw.includes('*') || raw.includes('/') || raw.includes('+') || raw.includes('-')) {
            try {
                // Find expressions like 5*10 or 10+10
                const exp = raw.match(/(\d+(\.\d+)?)\s*[\+\-\*\/]\s*(\d+(\.\d+)?)/);
                if(exp) {
                    const result = eval(exp[0]);
                    displayMsg = raw.replace(exp[0], `${exp[0]} = ${result}`);
                }
            } catch(e) { console.log("Math Error"); }
        }

        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        if(!chats[activeID]) chats[activeID] = [];
        chats[activeID].push({ text: displayMsg, time, deleted: false });
        
        localStorage.setItem('ld_v4_chats', JSON.stringify(chats));
        input.value = '';
        renderMessages();
    }

    function renderMessages() {
        const box = document.getElementById('chat-container');
        box.innerHTML = '';
        let bill = 0, jama = 0;

        if(chats[activeID]) {
            chats[activeID].forEach((m, i) => {
                const isJama = m.text.includes('+');
                const isBill = !isJama; // Default is bill/expense

                // Extract last number from message for calculation
                const nums = m.text.match(/\d+(\.\d+)?/g);
                const lastNum = nums ? parseFloat(nums[nums.length - 1]) : 0;

                if(!m.deleted) {
                    if(isJama) jama += lastNum;
                    else bill += lastNum;
                }

                box.innerHTML += `
                    <div class="message ${isJama ? 'msg-plus' : 'msg-minus'} ${m.deleted ? 'msg-deleted' : ''}">
                        ${m.text}
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                            <span style="font-size:10px; color:#888;">${m.time}</span>
                            ${!m.deleted ? `<span onclick="delMsg(${i})" style="color:red; font-size:12px; cursor:pointer;">🗑️ Delete</span>` : '<span style="font-size:10px; color:red;">Cancelled</span>'}
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('sumBill').innerText = bill.toFixed(2);
        document.getElementById('sumJama').innerText = jama.toFixed(2);
        document.getElementById('sumNet').innerText = (jama - bill).toFixed(2);
        box.scrollTop = box.scrollHeight;
    }

    function delMsg(i) {
        chats[activeID][i].deleted = true;
        localStorage.setItem('ld_v4_chats', JSON.stringify(chats));
        renderMessages();
    }

    function downloadPDF() {
        const element = document.body;
        html2pdf().from(element).set({ margin: 0.2, filename: 'Khata.pdf' }).save();
    }

    renderCustList();
</script>

</body>
</html>
