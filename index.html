<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Len-Den Chat Box</title>
    <style>
        :root {
            --whatsapp-green: #075E54;
            --whatsapp-light: #dcf8c6;
            --bg-color: #e5ddd5;
        }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        #sidebar { 
            width: 250px; background: #fff; border-right: 1px solid #ccc; 
            transition: 0.3s; position: fixed; height: 100%; z-index: 10;
            left: -250px;
        }
        #sidebar.open { left: 0; }
        .sidebar-header { background: var(--whatsapp-green); color: white; padding: 15px; font-weight: bold; }
        .customer-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }

        /* Main Chat Area */
        #main { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-color); margin-left: 0; width: 100%; }
        header { background: var(--whatsapp-green); color: white; padding: 10px; display: flex; align-items: center; }
        .toggle-btn { font-size: 24px; cursor: pointer; margin-right: 10px; background: none; border: none; color: white; }

        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 10px; margin-bottom: 10px; position: relative; font-size: 14px; }
        .msg.plus { align-self: flex-end; background: var(--whatsapp-light); border-bottom-right-radius: 0; }
        .msg.minus { align-self: flex-start; background: white; border-bottom-left-radius: 0; }
        .msg .time { font-size: 10px; color: gray; display: block; text-align: right; margin-top: 5px; }
        .del-btn { color: red; font-size: 10px; cursor: pointer; float: right; margin-left: 10px; }

        /* Footer & Summary */
        .summary-bar { background: #f0f0f0; padding: 10px; display: flex; justify-content: space-around; font-weight: bold; border-top: 1px solid #ccc; }
        .input-area { background: #eee; padding: 10px; display: flex; gap: 5px; }
        input[type="text"] { flex-grow: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button#send { background: var(--whatsapp-green); color: white; border: none; padding: 10px 15px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">Customers <span onclick="toggleSidebar()" style="float:right; cursor:pointer;">&times;</span></div>
    <div id="customer-list">
        <div class="customer-item" onclick="selectCustomer('Xyz, Colony Name')">Xyz, Colony Name</div>
    </div>
    <div style="padding:10px;">
        <input type="email" id="custEmail" placeholder="Customer Email">
        <button onclick="addCustomer()" style="width:100%; margin-top:5px;">+ Add Customer</button>
    </div>
</div>

<div id="main">
    <header>
        <button class="toggle-btn" onclick="toggleSidebar()">&#10095;</button>
        <div>
            <div id="current-name" style="font-weight: bold;">Len-Den Chat Box</div>
            <div id="current-info" style="font-size: 12px; opacity: 0.8;">Select a customer</div>
        </div>
    </header>

    <div id="chat-box"></div>

    <div class="summary-bar">
        <span>In (+): <span id="total-deposit">0</span></span>
        <span>Out (-): <span id="total-balance">0</span></span>
    </div>

    <div class="input-area">
        <input type="text" id="chatInput" placeholder="Ex: +800 doodh ya -500 jama">
        <button id="send" onclick="handleSend()">➡️</button>
    </div>
</div>

<script>
    let currentCustomer = "Default";
    let data = JSON.parse(localStorage.getItem('lenden_data')) || {};

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        const btn = document.querySelector('.toggle-btn');
        btn.innerHTML = btn.innerHTML === '❯' ? '❮' : '❯';
    }

    function selectCustomer(name) {
        currentCustomer = name;
        document.getElementById('current-name').innerText = name;
        renderMessages();
        toggleSidebar();
    }

    function handleSend() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        const date = new Date();
        const timeStr = date.toLocaleDateString() + " " + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        if (!data[currentCustomer]) data[currentCustomer] = [];
        
        data[currentCustomer].push({ text, time: timeStr });
        localStorage.setItem('lenden_data', JSON.stringify(data));
        
        input.value = "";
        renderMessages();
    }

    function deleteMsg(index) {
        data[currentCustomer].splice(index, 1);
        localStorage.setItem('lenden_data', JSON.stringify(data));
        renderMessages();
    }

    function renderMessages() {
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML = "";
        let deposit = 0;
        let balance = 0;

        const msgs = data[currentCustomer] || [];
        msgs.forEach((m, index) => {
            const isPlus = m.text.includes('+');
            const isMinus = m.text.includes('-');
            const typeClass = isPlus ? 'plus' : (isMinus ? 'minus' : '');

            // Amount nikalne ke liye
            const amount = parseFloat(m.text.replace(/[^0-9.-]/g, '')) || 0;
            if (isPlus) deposit += Math.abs(amount);
            if (isMinus) balance += Math.abs(amount);

            chatBox.innerHTML += `
                <div class="msg ${typeClass}">
                    ${m.text}
                    <span class="del-btn" onclick="deleteMsg(${index})">Delete</span>
                    <span class="time">${m.time}</span>
                </div>
            `;
        });

        document.getElementById('total-deposit').innerText = deposit;
        document.getElementById('total-balance').innerText = balance;
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addCustomer() {
        const email = document.getElementById('custEmail').value;
        if(email) {
            const name = email.split('@')[0];
            const list = document.getElementById('customer-list');
            list.innerHTML += `<div class="customer-item" onclick="selectCustomer('${name}')">${name} (${email})</div>`;
            document.getElementById('custEmail').value = "";
        }
    }

    // Initial Load
    renderMessages();
</script>

</body>
</html>
