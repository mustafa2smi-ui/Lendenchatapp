<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Len-Den Smart Billing</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #e5ddd5; height: 100vh; display: flex; flex-direction: column; }

        /* Sidebar & Header (Same as before) */
        #sidebar { position: fixed; left: -100%; top: 0; width: 85%; height: 100%; background: white; z-index: 1000; transition: 0.4s; box-shadow: 5px 0 15px rgba(0,0,0,0.3); }
        #sidebar.open { left: 0; }
        .sidebar-header { background: #075e54; color: white; padding: 20px; font-size: 20px; display: flex; justify-content: space-between; }
        .cust-form { padding: 15px; display: flex; flex-direction: column; gap: 10px; border-bottom: 2px solid #eee; }
        .cust-form input { padding: 12px; border: 1px solid #ccc; border-radius: 5px; }
        .cust-form button { padding: 12px; background: #128c7e; color: white; border: none; border-radius: 5px; font-weight: bold; }
        .cust-list { overflow-y: auto; height: calc(100% - 320px); }
        .cust-item { padding: 15px; border-bottom: 1px solid #f2f2f2; }

        header { background: #075e54; color: white; padding: 10px 15px; display: flex; align-items: center; height: 60px; position: fixed; top: 0; width: 100%; z-index: 500; }
        .toggle-btn { font-size: 24px; cursor: pointer; margin-right: 15px; background: none; border: none; color: white; }

        .stats-bar { position: fixed; top: 60px; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 400; font-weight: bold; }
        
        /* Chat Area */
        #chat-container { flex: 1; margin-top: 110px; margin-bottom: 70px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }

        .message { max-width: 85%; padding: 10px; border-radius: 8px; margin-bottom: 10px; position: relative; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-plus { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 0; }
        .msg-minus { align-self: flex-start; background: #ffffff; border-top-left-radius: 0; }
        
        /* Deleted Style */
        .msg-deleted { background: #f0f0f0 !important; color: #999 !important; text-decoration: line-through; opacity: 0.7; }
        .del-tag { font-size: 10px; color: red; font-style: italic; display: block; margin-top: 5px; text-decoration: none !important; }

        .msg-time { font-size: 10px; color: #888; display: block; text-align: right; margin-top: 4px; }
        .action-btn { cursor: pointer; font-size: 14px; margin-left: 10px; }

        /* Footer */
        footer { position: fixed; bottom: 0; width: 100%; background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 8px; z-index: 500; }
        #chatInput { flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none; }
        .send-btn { background: #128c7e; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .pdf-btn { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">Customers <span onclick="toggleSidebar()">&times;</span></div>
    <div class="cust-form">
        <input type="text" id="cName" placeholder="Name">
        <input type="text" id="cColony" placeholder="Colony">
        <input type="number" id="cMobile" placeholder="Mobile">
        <input type="email" id="cEmail" placeholder="Email">
        <button onclick="addNewCustomer()">Save Customer</button>
    </div>
    <div id="customerList" class="cust-list"></div>
</div>

<header>
    <button class="toggle-btn" onclick="toggleSidebar()">❯</button>
    <div style="flex:1">
        <div id="headName" style="font-weight: bold;">Len-Den Box</div>
        <div id="headInfo" style="font-size: 11px;">Select customer</div>
    </div>
    <a href="page2.html">👍</a>
    <a href="page4.html">👌</a>
    <button class="pdf-btn" onclick="downloadPDF()">PDF ⬇️</button>
</header>

<div class="stats-bar" id="pdf-stats">
    <div>Deposit (+): <span id="sumIn" style="color:green">0</span></div>
    <div>Balance (-): <span id="sumOut" style="color:red">0</span></div>
</div>

<div id="chat-container"></div>

<footer>
    <input type="text" id="chatInput" placeholder="Item 5*10 or +500 or ++">
    <button class="send-btn" onclick="processChat()">➤</button>
</footer>

<script>
    let customers = JSON.parse(localStorage.getItem('my_cust_v3')) || [];
    let chats = JSON.parse(localStorage.getItem('my_chats_v3')) || {};
    let activeID = null;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function addNewCustomer() {
        const name = document.getElementById('cName').value;
        const id = 'ID' + Date.now();
        if(!name) return alert("Name zaroori hai!");
        customers.push({ id, name, colony: document.getElementById('cColony').value, mobile: document.getElementById('cMobile').value });
        localStorage.setItem('my_cust_v3', JSON.stringify(customers));
        showCustomers();
    }

    function showCustomers() {
        document.getElementById('customerList').innerHTML = customers.map(c => `
            <div class="cust-item" onclick="selectCust('${c.id}')">
                <strong>${c.name}</strong><br><small>${c.mobile}</small>
            </div>
        `).join('');
    }

    function selectCust(id) {
        activeID = id;
        const c = customers.find(x => x.id === id);
        document.getElementById('headName').innerText = c.name;
        document.getElementById('headInfo').innerText = c.mobile;
        toggleSidebar();
        renderMessages();
    }

    function processChat() {
        if(!activeID) return alert("Customer chunein!");
        const input = document.getElementById('chatInput');
        let val = input.value.trim();
        if(!val) return;

        if(!chats[activeID]) chats[activeID] = [];

        // Logic ++ (Total Calculation)
        if(val === '++') {
            let subTotal = 0;
            chats[activeID].forEach(m => {
                if(!m.deleted && m.text.includes('*')) {
                    const parts = m.text.match(/(\d+(\.\d+)?)\s*\*\s*(\d+(\.\d+)?)/);
                    if(parts) subTotal += parseFloat(parts[1]) * parseFloat(parts[3]);
                }
            });
            val = `Total Billing: ${subTotal} (++)`;
        } 
        // Logic 5*10 (Item Calculation)
        else if(val.includes('*')) {
            const parts = val.match(/(\d+(\.\d+)?)\s*\*\s*(\d+(\.\d+)?)/);
            if(parts) {
                const res = parseFloat(parts[1]) * parseFloat(parts[3]);
                val = `${val} = ${res}`;
            }
        }

        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        chats[activeID].push({ text: val, time, deleted: false });
        localStorage.setItem('my_chats_v3', JSON.stringify(chats));
        input.value = '';
        renderMessages();
    }

    function softDelete(idx) {
        chats[activeID][idx].deleted = true;
        localStorage.setItem('my_chats_v3', JSON.stringify(chats));
        renderMessages();
    }

    function renderMessages() {
        const box = document.getElementById('chat-container');
        box.innerHTML = '';
        let totalIn = 0, totalOut = 0;

        if(chats[activeID]) {
            chats[activeID].forEach((m, i) => {
                const isPlus = m.text.includes('+');
                const isMinus = m.text.includes('-');
                
                if(!m.deleted) {
                    const num = parseFloat(m.text.replace(/[^0-9.]/g, '')) || 0;
                    if(isPlus) totalIn += num;
                    if(isMinus) totalOut += num;
                }

                const cls = isPlus ? 'msg-plus' : 'msg-minus';
                const delCls = m.deleted ? 'msg-deleted' : '';
                
                box.innerHTML += `
                    <div class="message ${cls} ${delCls}">
                        ${m.text}
                        ${m.deleted ? '<span class="del-tag">Entry Cancelled</span>' : `<span class="action-btn" onclick="softDelete(${i})">🗑️</span>`}
                        <span class="msg-time">${m.time}</span>
                    </div>
                `;
            });
        }
        document.getElementById('sumIn').innerText = totalIn;
        document.getElementById('sumOut').innerText = totalOut;
        box.scrollTop = box.scrollHeight;
    }

    function downloadPDF() {
        if(!activeID) return alert("Pehle customer select karein");
        const element = document.body;
        const opt = {
            margin: 0.5,
            filename: `Bill_${document.getElementById('headName').innerText}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    showCustomers();
</script>

</body>
</html>
