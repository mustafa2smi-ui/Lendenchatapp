<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Len-Den Chat Pro</title>
    <style>
        :root {
            --whatsapp-green: #075E54;
            --whatsapp-light: #dcf8c6;
            --bg-color: #e5ddd5;
            --accent: #128C7E;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: #f0f2f5; }
        
        /* Sidebar Design */
        #sidebar { 
            width: 300px; background: white; border-right: 1px solid #ddd; 
            transition: 0.3s ease; position: fixed; height: 100%; z-index: 100;
            left: -300px; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        #sidebar.open { left: 0; }
        .sidebar-header { background: var(--whatsapp-green); color: white; padding: 20px 15px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        .customer-form { padding: 15px; background: #f9f9f9; border-bottom: 1px solid #eee; }
        .customer-form input { width: 90%; padding: 10px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; }
        .customer-form button { width: 97%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .customer-list { height: calc(100% - 250px); overflow-y: auto; }
        .customer-item { padding: 15px; border-bottom: 1px solid #f2f2f2; cursor: pointer; transition: 0.2s; }
        .customer-item:hover { background: #f5f5f5; }
        .customer-item .c-name { font-weight: bold; display: block; color: #333; }
        .customer-item .c-info { font-size: 12px; color: #666; }

        /* Main Chat Design */
        #main { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        header { background: var(--whatsapp-green); color: white; padding: 12px 15px; display: flex; align-items: center; z-index: 50; }
        .toggle-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: white; margin-right: 15px; }

        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: var(--bg-color); display: flex; flex-direction: column; }
        
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 8px; margin-bottom: 12px; position: relative; font-size: 15px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg.plus { align-self: flex-end; background: var(--whatsapp-light); border-top-right-radius: 0; }
        .msg.minus { align-self: flex-start; background: white; border-top-left-radius: 0; }
        
        .msg-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; font-size: 10px; color: #666; }
        .del-btn { color: #e74c3c; cursor: pointer; font-weight: bold; margin-left: 10px; }

        /* Summary Bar */
        .summary-bar { background: white; padding: 12px; display: flex; justify-content: space-around; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 11px; color: #666; display: block; }
        .stat-val { font-size: 16px; font-weight: bold; }
        .text-plus { color: #27ae60; }
        .text-minus { color: #c0392b; }

        /* Input Area */
        .input-area { background: #f0f0f0; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        .input-area input { flex-grow: 1; padding: 12px 18px; border-radius: 25px; border: none; outline: none; font-size: 15px; }
        .send-btn { background: var(--accent); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <span>Naya Customer</span>
        <span onclick="toggleSidebar()" style="cursor:pointer; font-size: 25px;">&times;</span>
    </div>
    <div class="customer-form">
        <input type="text" id="custName" placeholder="Customer Name">
        <input type="text" id="custColony" placeholder="Colony Name">
        <input type="number" id="custMobile" placeholder="Mobile Number">
        <input type="email" id="custEmail" placeholder="Email Address (Optional)">
        <button onclick="saveCustomer()">+ Add Customer</button>
    </div>
    <div class="customer-list" id="customer-list">
        </div>
</div>

<div id="main">
    <header>
        <button class="toggle-btn" onclick="toggleSidebar()">❯</button>
        <div>
            <div id="header-name" style="font-weight: bold; font-size: 16px;">Len-Den Chat Box</div>
            <div id="header-info" style="font-size: 11px; opacity: 0.9;">Select a customer to start</div>
        </div>
    </header>

    <div id="chat-box">
        </div>

    <div class="summary-bar">
        <div class="stat-box">
            <span class="stat-label">TOTAL DEPOSIT (+)</span>
            <span class="stat-val text-plus" id="total-deposit">₹0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">TOTAL BALANCE (-)</span>
            <span class="stat-val text-minus" id="total-balance">₹0</span>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="chatInput" placeholder="Type '+500 payment' or '-200 udhaar'">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    let customers = JSON.parse(localStorage.getItem('ld_customers')) || [];
    let transactions = JSON.parse(localStorage.getItem('ld_tx')) || {};
    let activeCustomer = null;

    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        sb.classList.toggle('open');
        document.querySelector('.toggle-btn').innerText = sb.classList.contains('open') ? '❮' : '❯';
    }

    function saveCustomer() {
        const name = document.getElementById('custName').value;
        const colony = document.getElementById('custColony').value;
        const mobile = document.getElementById('custMobile').value;
        const email = document.getElementById('custEmail').value;

        if(!name || !mobile) { alert("Name aur Mobile zaroori hai!"); return; }

        const cid = 'c_' + Date.now();
        customers.push({ id: cid, name, colony, mobile, email });
        localStorage.setItem('ld_customers', JSON.stringify(customers));
        
        // Reset fields
        document.querySelectorAll('.customer-form input').forEach(i => i.value = '');
        renderCustomerList();
    }

    function renderCustomerList() {
        const list = document.getElementById('customer-list');
        list.innerHTML = customers.map(c => `
            <div class="customer-item" onclick="selectCustomer('${c.id}')">
                <span class="c-name">${c.name}</span>
                <span class="c-info">${c.colony} | ${c.mobile}</span>
            </div>
        `).join('');
    }

    function selectCustomer(id) {
        activeCustomer = customers.find(c => c.id === id);
        document.getElementById('header-name').innerText = activeCustomer.name;
        document.getElementById('header-info').innerText = `${activeCustomer.colony} | ${activeCustomer.mobile}`;
        toggleSidebar();
        renderChat();
    }

    function sendMessage() {
        if(!activeCustomer) { alert("Pehle customer select karein!"); return; }
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if(!text) return;

        if(!transactions[activeCustomer.id]) transactions[activeCustomer.id] = [];
        
        const now = new Date();
        const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        transactions[activeCustomer.id].push({ text, time, ts: Date.now() });
        localStorage.setItem('ld_tx', JSON.stringify(transactions));
        
        input.value = '';
        renderChat();
    }

    function deleteTx(index) {
        transactions[activeCustomer.id].splice(index, 1);
        localStorage.setItem('ld_tx', JSON.stringify(transactions));
        renderChat();
    }

    function renderChat() {
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        let deposit = 0, balance = 0;

        if(activeCustomer && transactions[activeCustomer.id]) {
            transactions[activeCustomer.id].forEach((t, index) => {
                const isPlus = t.text.includes('+');
                const isMinus = t.text.includes('-');
                const type = isPlus ? 'plus' : (isMinus ? 'minus' : '');
                
                const amt = parseFloat(t.text.replace(/[^0-9.-]/g, '')) || 0;
                if(isPlus) deposit += Math.abs(amt);
                if(isMinus) balance += Math.abs(amt);

                box.innerHTML += `
                    <div class="msg ${type}">
                        <div>${t.text}</div>
                        <div class="msg-footer">
                            <span>${t.time}</span>
                            <span class="del-btn" onclick="deleteTx(${index})">Del</span>
                        </div>
                    </div>
                `;
            });
        }
        
        document.getElementById('total-deposit').innerText = '₹' + deposit;
        document.getElementById('total-balance').innerText = '₹' + balance;
        box.scrollTop = box.scrollHeight;
    }

    // Initial load
    renderCustomerList();
</script>

</body>
</html>
