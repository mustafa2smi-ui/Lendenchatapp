    <div class="stat-item" style="color:#e74c3c;">Total Bill<b id="sumBill">0</b></div>
    <div class="stat-item" style="color:#27ae60;">Total Jama<b id="sumJama">0</b></div>

</div>

<footer>

    <button class="send-btn" onclick="processChat()">➤</button>
</footer>

<script>
    let customers = JSON.parse(localStorage.getItem('ld_v5_cust')) || [];
    let chats = JSON.parse(localStorage.getItem('ld_v5_chats')) || {};
    let activeID = null;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function addNewCustomer() {
        const name = document.getElementById('cName').value;
        const mobile = document.getElementById('cMobile').value;
        if(!name) return;
        const id = 'C' + Date.now();
        customers.push({ id, name, mobile });
        localStorage.setItem('ld_v5_cust', JSON.stringify(customers));
        renderCustList();
    }

    function renderCustList() {
        document.getElementById('customerList').innerHTML = customers.map(c => `
            <div onclick="selectCust('${c.id}')" style="padding:15px; border-bottom:1px solid #eee;">
                <b>${c.name}</b><br><small>${c.mobile}</small>
            </div>
        `).join('');
    }

    function selectCust(id) {
        activeID = id;
        const c = customers.find(x => x.id === id);
        document.getElementById('headName').innerText = c.name;
        document.getElementById('headInfo').innerText = c.mobile;
        toggleSidebar();
        renderMessages();
    }

    function processChat() {
        if(!activeID) return alert("Pehle customer select karein");
        const input = document.getElementById('chatInput');
        let text = input.value.trim();
        if(!text) return;

        // Auto Calculation logic for multi-line
        let processedText = "";
        let lines = text.split('\n');
        
        lines.forEach(line => {
            // Agar line me 5*10 jaisa math hai
            const mathMatch = line.match(/(\d+(\.\d+)?)\s*[\+\-\*\/]\s*(\d+(\.\d+)?)/);
            if(mathMatch) {
                try {
                    const res = eval(mathMatch[0]);
                    processedText += line.replace(mathMatch[0], `${mathMatch[0]} = ${res}`) + "\n";
                } catch(e) { processedText += line + "\n"; }
            } else {
                processedText += line + "\n";
            }
        });

        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        if(!chats[activeID]) chats[activeID] = [];
        chats[activeID].push({ text: processedText.trim(), time, deleted: false });
        
        localStorage.setItem('ld_v5_chats', JSON.stringify(chats));
        input.value = '';
        renderMessages();
    }

    function renderMessages() {
        const box = document.getElementById('chat-container');
        box.innerHTML = '';
        let bill = 0, jama = 0;

        if(chats[activeID]) {
            chats[activeID].forEach((m, i) => {
                const isJama = m.text.includes('+');
                
                // Pure message me se saare numbers nikal kar add karna
                let msgTotal = 0;
                const nums = m.text.match(/\d+(\.\d+)?/g);
                if(nums) {
                    // Agar message me '=' hai toh sirf '=' ke baad wala number le
                    if(m.text.includes('=')) {
                        const parts = m.text.split('=');
                        const lastPartNums = parts[parts.length-1].match(/\d+(\.\d+)?/g);
                        msgTotal = lastPartNums ? parseFloat(lastPartNums[0]) : 0;
                    } else {
                        // Sabhi numbers ka total (agar list hai toh)
                        nums.forEach(n => msgTotal += parseFloat(n));
                    }
                }

                if(!m.deleted) {
                    if(isJama) jama += msgTotal;
                    else bill += msgTotal;
                }

                box.innerHTML += `
                    <div class="message ${isJama ? 'msg-plus' : 'msg-minus'} ${m.deleted ? 'msg-deleted' : ''}">
                        ${m.text}
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px; border-top:1px solid rgba(0,0,0,0.05); padding-top:5px;">
                            <span style="font-size:10px; color:#888;">${m.time}</span>
                            ${!m.deleted ? `<span onclick="delMsg(${i})" style="color:red; font-size:11px; cursor:pointer;">🗑️ Delete</span>` : '<span style="font-size:10px; color:red;">Entry Cancelled</span>'}
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('sumBill').innerText = bill.toFixed(2);
        document.getElementById('sumJama').innerText = jama.toFixed(2);
        document.getElementById('sumNet').innerText = (jama - bill).toFixed(2);
        box.scrollTop = box.scrollHeight;
    }

    function delMsg(i) {
        chats[activeID][i].deleted = true;
        localStorage.setItem('ld_v5_chats', JSON.stringify(chats));
        renderMessages();
    }

    function downloadPDF() {
        const element = document.body;
        html2pdf().from(element).set({ margin: 0.1, filename: 'Bill.pdf', html2canvas: { scale: 2 } }).save();
    }

    renderCustList();
</script>

</body>
</html>

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    // BLUR FIX: Kahin bhi touch karne par update hoga
    function handleBlur() {
        const el = document.getElementById('chatInput');
        const lines = el.value.split('\n');
        let updated = false;
        
        const updatedLines = lines.map(line => {
            if (mathRegex.test(line) && !line.includes('=')) {
                updated = true;
                try {
                    let expression = line.match(mathRegex)[0];
                    return `${line} = ${eval(expression)}`;
                } catch(e) { return line; }
            }
            return line;
        });
        if (updated) el.value = updatedLines.join('\n');
    }

    function handleEnter(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            const el = e.target;
            const start = el.selectionStart;
            const text = el.value;
            
            const lastNL = text.lastIndexOf('\n', start - 1);
            const nextNL = text.indexOf('\n', start);
            const lineStart = lastNL + 1;
            const lineEnd = nextNL === -1 ? text.length : nextNL;
            const currentLine = text.substring(lineStart, lineEnd);

            if (mathRegex.test(currentLine)) {
                try {
                    let expression = currentLine.match(mathRegex)[0];
                    let res = eval(expression);
                    let newLineText = currentLine.includes('=') ? currentLine.replace(/=.*$/, `= ${res}`) : `${currentLine} = ${res}`;
                    
                    el.value = text.substring(0, lineStart) + newLineText + '\n' + text.substring(lineEnd);
                    let newPos = lineStart + newLineText.length + 1;
                    el.setSelectionRange(newPos, newPos);
                } catch(err) { addNewLine(el, start, text); }
            } else { addNewLine(el, start, text); }
        }
    }

    function addNewLine(el, start, text) {
        el.value = text.substring(0, start) + '\n' + text.substring(start);
        el.setSelectionRange(start + 1, start + 1);
    }

    function addNewCustomer() {
        const name = document.getElementById('cName').value;
        if(!name) return;
        const id = 'C' + Date.now();
        customers.push({ id, name, mobile: document.getElementById('cMobile').value });
        localStorage.setItem('ld_v10_cust', JSON.stringify(customers));
        renderCustList();
    }

    function renderCustList() {
        document.getElementById('customerList').innerHTML = customers.map(c => `
            <div onclick="selectCust('${c.id}')" style="padding:15px; border-bottom:1px solid #eee;">
                <b>${c.name}</b><br><small>${c.mobile}</small>
            </div>
        `).join('');
    }

    function selectCust(id) {
        activeID = id;
        const c = customers.find(x => x.id === id);
        document.getElementById('headName').innerText = c.name;
        document.getElementById('headInfo').innerText = c.mobile;
        toggleSidebar();
        renderMessages();
    }

    function processChat() {
        if(!activeID) return alert("Select Customer");
        const input = document.getElementById('chatInput');
        let text = input.value.trim();
        if(!text) return;
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        if(!chats[activeID]) chats[activeID] = [];
        chats[activeID].push({ text, time, deleted: false });
        localStorage.setItem('ld_v10_chats', JSON.stringify(chats));
        input.value = '';
        renderMessages();
    }

    function calculateMsgTotal(text) {
        let total = 0;
        text.split('\n').forEach(line => {
            const nums = line.match(/\d+(\.\d+)?/g);
            if(nums) total += parseFloat(nums[nums.length - 1]);
        });
        return total;
    }

    function renderMessages() {
        const box = document.getElementById('chat-container');
        box.innerHTML = '';
        let b = 0, j = 0;
        if(chats[activeID]) {
            chats[activeID].forEach((m, i) => {
                const isJama = m.text.includes('+');
                const msgTotal = calculateMsgTotal(m.text);
                if(!m.deleted) { if(isJama) j += msgTotal; else b += msgTotal; }
                box.innerHTML += `
                    <div class="message ${isJama ? 'msg-plus' : 'msg-minus'} ${m.deleted ? 'msg-deleted' : ''}">
                        <div>${m.text.replace(/\n/g, '<br>')}</div>
                        <div class="msg-info">
                            <span style="font-weight:bold; color:#075e54;">₹${msgTotal.toFixed(2)}</span>
                            <span style="color:#888;">${m.time} | <span onclick="delMsg(${i})" style="color:red; cursor:pointer;">🗑️</span></span>
                        </div>
                    </div>`;
            });
        }
        document.getElementById('sumBill').innerText = b.toFixed(2);
        document.getElementById('sumJama').innerText = j.toFixed(2);
        document.getElementById('sumNet').innerText = (j - b).toFixed(2);
        box.scrollTop = box.scrollHeight;
    }

    function delMsg(i) {
        chats[activeID][i].deleted = true;
        localStorage.setItem('ld_v10_chats', JSON.stringify(chats));
        renderMessages();
    }

    function downloadPDF() { html2pdf().from(document.getElementById('chat-container')).set({ margin: 0.2, filename: 'LenDen.pdf' }).save(); }

    // Visual Viewport Fix for Keyboard
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.body.style.height = window.visualViewport.height + 'px';
            setTimeout(() => { document.getElementById('chat-container').scrollTop = 999999; }, 200);
        });
    }

    renderCustList();
</script>
</body>
</html>
