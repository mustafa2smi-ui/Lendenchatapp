<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Ledger Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #e5ddd5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Fixed Top Section */
        .top-fixed { position: fixed; top: 0; width: 100%; z-index: 1000; background: white; }
        
        header { background: #075e54; color: white; padding: 10px 15px; display: flex; align-items: center; height: 60px; }
        
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; padding: 10px 5px; border-bottom: 1px solid #ddd; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat-item b { display: block; font-size: 15px; }

        /* Chat Area - Fixed Scrolling */
        #chat-container { 
            flex: 1; 
            margin-top: 125px; /* Header + Stats height */
            margin-bottom: 75px; /* Footer height */
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
        }

        .message { max-width: 85%; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 16px; white-space: pre-wrap; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; }
        .msg-plus { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 0; }
        .msg-minus { align-self: flex-start; background: #ffffff; border-top-left-radius: 0; }
        .msg-deleted { opacity: 0.5; text-decoration: line-through; background: #f0f0f0 !important; }

        /* Sidebar */
        #sidebar { position: fixed; left: -100%; top: 0; width: 85%; height: 100%; background: white; z-index: 2000; transition: 0.4s; box-shadow: 5px 0 15px rgba(0,0,0,0.3); }
        #sidebar.open { left: 0; }

        /* Footer */
        footer { position: fixed; bottom: 0; width: 100%; background: #f0f0f0; padding: 8px 12px; display: flex; align-items: flex-end; gap: 8px; z-index: 1000; }
        #chatInput { flex: 1; padding: 12px 15px; border-radius: 20px; border: 1px solid #ccc; outline: none; font-size: 16px; min-height: 45px; max-height: 120px; resize: none; }
        .send-btn { background: #128c7e; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="background:#075e54; color:white; padding:20px; font-size:20px;">Customer List <span onclick="toggleSidebar()" style="float:right;">&times;</span></div>
    <div style="padding:15px; display:flex; flex-direction:column; gap:10px;">
        <input type="text" id="cName" placeholder="Customer Name" style="padding:12px; border:1px solid #ccc; border-radius:8px;">
        <input type="number" id="cMobile" placeholder="Mobile" style="padding:12px; border:1px solid #ccc; border-radius:8px;">
        <button onclick="addNewCustomer()" style="padding:12px; background:#128c7e; color:white; border:none; border-radius:8px;">+ Add Customer</button>
    </div>
    <div id="customerList" style="overflow-y:auto; height:calc(100% - 250px);"></div>
</div>

<div class="top-fixed">
    <header>
        <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:24px; margin-right:15px;">❯</button>
        <div style="flex:1">
            <div id="headName" style="font-weight:bold;">Len-Den Pro</div>
            <div id="headInfo" style="font-size:11px;">Select Customer</div>
        </div>
        <button onclick="downloadPDF()" style="background:#e74c3c; color:white; border:none; padding:8px 12px; border-radius:5px; font-size:12px;">PDF</button>
    </header>

    <div class="stats-bar">
        <div class="stat-item" style="color:#e74c3c;">Total Bill<b id="sumBill">0</b></div>
        <div class="stat-item" style="color:#27ae60;">Total Jama<b id="sumJama">0</b></div>
        <div class="stat-item" style="color:#2980b9;">Credit<b id="sumNet">0</b></div>
    </div>
</div>

<div id="chat-container"></div>

<footer>
    <textarea id="chatInput" placeholder="Aata 250 (Enter) Tel 250..."></textarea>
    <button class="send-btn" onclick="processChat()">➤</button>
</footer>

<script>
    let customers = JSON.parse(localStorage.getItem('ld_v6_cust')) || [];
    let chats = JSON.parse(localStorage.getItem('ld_v6_chats')) || {};
    let activeID = null;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function addNewCustomer() {
        const name = document.getElementById('cName').value;
        const mobile = document.getElementById('cMobile').value;
        if(!name) return;
        const id = 'C' + Date.now();
        customers.push({ id, name, mobile });
        localStorage.setItem('ld_v6_cust', JSON.stringify(customers));
        renderCustList();
    }

    function renderCustList() {
        document.getElementById('customerList').innerHTML = customers.map(c => `
            <div onclick="selectCust('${c.id}')" style="padding:15px; border-bottom:1px solid #eee;">
                <b>${c.name}</b><br><small>${c.mobile}</small>
            </div>
        `).join('');
    }

    function selectCust(id) {
        activeID = id;
        const c = customers.find(x => x.id === id);
        document.getElementById('headName').innerText = c.name;
        document.getElementById('headInfo').innerText = c.mobile;
        toggleSidebar();
        renderMessages();
    }

    function processChat() {
        if(!activeID) return alert("Select Customer");
        const input = document.getElementById('chatInput');
        let text = input.value.trim();
        if(!text) return;

        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        if(!chats[activeID]) chats[activeID] = [];
        chats[activeID].push({ text, time, deleted: false });
        
        localStorage.setItem('ld_v6_chats', JSON.stringify(chats));
        input.value = '';
        renderMessages();
    }

    function renderMessages() {
        const box = document.getElementById('chat-container');
        box.innerHTML = '';
        let bill = 0, jama = 0;

        if(chats[activeID]) {
            chats[activeID].forEach((m, i) => {
                const isJama = m.text.includes('+');
                let rowTotal = 0;

                if(!m.deleted) {
                    const lines = m.text.split('\n');
                    lines.forEach(line => {
                        // Regex to find only the LAST number in a string (ignores '2lt', '5kg' etc.)
                        const nums = line.match(/\d+(\.\d+)?/g);
                        if(nums) {
                            rowTotal += parseFloat(nums[nums.length - 1]);
                        }
                    });
                    if(isJama) jama += rowTotal; else bill += rowTotal;
                }

                box.innerHTML += `
                    <div class="message ${isJama ? 'msg-plus' : 'msg-minus'} ${m.deleted ? 'msg-deleted' : ''}">
                        ${m.text}
                        <div style="display:flex; justify-content:space-between; margin-top:5px; border-top:1px solid rgba(0,0,0,0.05); padding-top:5px;">
                            <span style="font-size:10px; color:#888;">${m.time}</span>
                            ${!m.deleted ? `<span onclick="delMsg(${i})" style="color:red; font-size:11px; cursor:pointer;">🗑️ Delete</span>` : '<span style="font-size:10px; color:red;">Cancelled</span>'}
                        </div>
                    </div>
                `;
            });
        }
        document.getElementById('sumBill').innerText = bill.toFixed(2);
        document.getElementById('sumJama').innerText = jama.toFixed(2);
        document.getElementById('sumNet').innerText = (jama - bill).toFixed(2);
        box.scrollTop = box.scrollHeight;
    }

    function delMsg(i) {
        chats[activeID][i].deleted = true;
        localStorage.setItem('ld_v6_chats', JSON.stringify(chats));
        renderMessages();
    }

    function downloadPDF() {
        const element = document.body;
        html2pdf().from(element).set({ margin: 0.1, filename: 'Bill.pdf' }).save();
    }

    renderCustList();
</script>
</body>
</html>
